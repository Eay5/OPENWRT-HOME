name: Build All OpenWrt Variants

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: SSH connection to Actions
        required: false
        default: "false"

env:
  TZ: Asia/Shanghai

jobs:
  dispatch:
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger build workflows
        env:
          GH_TOKEN: ${{ github.token }}
          SSH_INPUT: ${{ github.event.inputs.ssh }}
        run: |
          workflows=(
            "6.18-openwrt.yml"
            "6.12-openwrt.yml"
            "6.12-openwrt-ubuntu24-test.yml"
            "6.6-openwrt.yml"
            "6.1-openwrt.yml"
            "5.15-openwrt.yml"
            "5.10-openwrt.yml"
            "5.10.lucky-openwrt.yml"
            "5.4-openwrt.yml"
          )

          for workflow in "${workflows[@]}"; do
            echo "Triggering ${workflow}"

            if [ "${SSH_INPUT}" = "true" ]; then
              gh workflow run "${workflow}" --repo "${GITHUB_REPOSITORY}" -f ssh=true
            else
              gh workflow run "${workflow}" --repo "${GITHUB_REPOSITORY}"
            fi
          done

      - name: Print summary
        run: |
          echo "Triggered workflows:"
          echo "  - 6.18-openwrt.yml"
          echo "  - 6.12-openwrt.yml"
          echo "  - 6.12-openwrt-ubuntu24-test.yml"
          echo "  - 6.6-openwrt.yml"
          echo "  - 6.1-openwrt.yml"
          echo "  - 5.15-openwrt.yml"
          echo "  - 5.10-openwrt.yml"
          echo "  - 5.10.lucky-openwrt.yml"
          echo "  - 5.4-openwrt.yml"
