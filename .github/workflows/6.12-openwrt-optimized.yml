name: Build 6.12-OpenWrt-Optimized

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "SSH connection to Actions"
        required: false
        default: "false"
  schedule:
    - cron: "0 19 * * *"
  watch:
    types: [started]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 6.12-optimized.config
  DIY_P1_SH: 6.12-part1.sh
  DIY_P2_SH: 6.12-part2-optimized.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify local files
        run: |
          set -euo pipefail
          ls -la "$GITHUB_WORKSPACE"
          [ -f "$CONFIG_FILE" ] && echo "Found $CONFIG_FILE" || { echo "Missing $CONFIG_FILE"; exit 1; }
          [ -f "$DIY_P1_SH" ] && echo "Found $DIY_P1_SH" || { echo "Missing $DIY_P1_SH"; exit 1; }
          [ -f "$DIY_P2_SH" ] && echo "Found $DIY_P2_SH" || { echo "Missing $DIY_P2_SH"; exit 1; }

      - name: Free disk space
        uses: coder-xiaomo/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp nano ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools \
            qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip upx-ucl vim \
            wget xmlto xxd zlib1g-dev zstd
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo -E timedatectl set-timezone "$TZ"

      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: openwrt-6.12-optimized-${{ github.sha }}
          restore-keys: |
            openwrt-6.12-optimized-
          max-size: 2G

      - name: Clone OpenWrt source
        run: |
          set -euo pipefail
          df -hT "$PWD"
          git clone --depth 1 "$REPO_URL" -b "$REPO_BRANCH" openwrt

      - name: Apply feed customizations
        run: |
          set -euo pipefail
          [ -e "$FEEDS_CONF" ] && cp "$FEEDS_CONF" openwrt/feeds.conf.default
          chmod +x "$DIY_P1_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P1_SH"

      - name: Install feeds
        run: |
          set -euo pipefail
          cd openwrt
          ./scripts/feeds install -a

      - name: Apply build configuration
        run: |
          set -euo pipefail
          if [ -d files ]; then
            mkdir -p openwrt/files
            cp -r files/. openwrt/files/
          fi
          cp "$CONFIG_FILE" openwrt/.config
          chmod +x "$DIY_P2_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: Finalize .config
        run: |
          set -euo pipefail
          cd openwrt
          make defconfig
          yes "" | make oldconfig
          sed -i 's/KERNEL_PATCHVER:=.*/KERNEL_PATCHVER:=6.12/g' target/linux/x86/Makefile

          ensure_config() {
            local key="$1"
            local value="$2"

            if grep -q "^${key}=" .config; then
              sed -i "s/^${key}=.*/${key}=${value}/" .config
            else
              echo "${key}=${value}" >> .config
            fi
          }

          echo "Reapplying optimized package toggles after oldconfig..."
          ensure_config CONFIG_BUILD_PATENTED y
          ensure_config CONFIG_LINUX_6_12 y
          ensure_config CONFIG_PACKAGE_ksmbd-server n
          ensure_config CONFIG_PACKAGE_ksmbd-utils n
          ensure_config CONFIG_PACKAGE_luci-app-ksmbd n
          ensure_config CONFIG_PACKAGE_kmod-fs-ksmbd n
          ensure_config CONFIG_PACKAGE_autosamba n
          ensure_config CONFIG_PACKAGE_miniupnpd n
          ensure_config CONFIG_PACKAGE_luci-app-upnp n
          ensure_config CONFIG_PACKAGE_luci-i18n-upnp-zh-cn n
          ensure_config CONFIG_KERNEL_SWAP y

      - name: SSH debug
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true'
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Download packages
        run: |
          set -euo pipefail
          cd openwrt
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5"
            make download -j"$(nproc)" V=s && break
            echo "Download failed, removing incomplete files before retry..."
            find dl -size -1024c -exec rm -f {} \;
            sleep 10
          done
          find dl -size -1024c -exec rm -f {} \; || true

      - name: Show disk usage
        run: df -hT

      - name: Build tools and toolchain
        run: |
          set -euo pipefail
          cd openwrt
          echo "Building with $(nproc) jobs"
          make tools/install -j"$(nproc)" V=s 2>&1 | tee tools_install.log || make tools/install -j1 V=s 2>&1 | tee tools_install.log
          make toolchain/install -j"$(nproc)" V=s 2>&1 | tee toolchain_install.log || make toolchain/install -j1 V=s 2>&1 | tee toolchain_install.log

      - name: Build firmware
        id: compile
        run: |
          set -euo pipefail
          cd openwrt
          echo "Starting build with $(nproc) jobs"

          if make -j"$(nproc)" V=s 2>&1 | tee build.log; then
            echo "Parallel build completed successfully."
          else
            echo "Parallel build failed, retrying with -j1..."
            find dl -size -1024c -exec rm -f {} \;
            make download -j4 V=s || true
            make -j1 V=s 2>&1 | tee -a build.log
          fi

          echo "Checking generated firmware files..."
          find bin/targets -type f \( -name "*.img*" -o -name "*.vmdk" -o -name "*.qcow2" \) 2>/dev/null || true

          if ls bin/targets/x86/64/*combined*.img* 1>/dev/null 2>&1 || \
             ls bin/targets/x86/64/*squashfs*.img* 1>/dev/null 2>&1 || \
             ls bin/targets/x86/64/*.vmdk 1>/dev/null 2>&1; then
            echo "Firmware images were generated successfully."
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "No firmware images were generated."
            find bin -type f 2>/dev/null | head -50 || true
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "DEVICE_NAME=x86-64" >> "$GITHUB_ENV"
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            openwrt/.config
            openwrt/build.log
            openwrt/tools_install.log
            openwrt/toolchain_install.log

      - name: Detect kernel version
        if: steps.compile.outputs.status == 'success'
        run: |
          set -euo pipefail
          KERNEL_VERSION=$(grep 'LINUX_VERSION-6.12' openwrt/include/kernel-6.12 2>/dev/null | cut -d' ' -f3 || echo "6.12")
          echo "KERNEL_VERSION=${KERNEL_VERSION}" >> "$GITHUB_ENV"

      - name: Organize firmware
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          set -euo pipefail
          TARGETS_DIR=$(find openwrt/bin/targets -mindepth 2 -maxdepth 2 -type d 2>/dev/null | head -1)

          if [ -z "$TARGETS_DIR" ]; then
            echo "No firmware target directory found."
            find openwrt/bin -type d 2>/dev/null || true
            exit 1
          fi

          echo "Using target directory: $TARGETS_DIR"
          cd "$TARGETS_DIR"
          ls -la
          rm -rf packages *.buildinfo *.manifest sha256sums *.json

          if ls *.img* *.vmdk *.qcow2 1>/dev/null 2>&1; then
            ls -lh *.img* *.vmdk *.qcow2 2>/dev/null || true
            echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "No firmware artifacts remained after cleanup."
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success'
        with:
          name: OpenWrt-6.12-Optimized_${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          if-no-files-found: error

      - name: Prepare release notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
        run: |
          set -euo pipefail
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_ENV"
          cat > release.txt <<EOF
          OpenWrt 6.12 optimized build

          - Kernel: ${KERNEL_VERSION:-6.12}
          - Platform: x86_64
          - Default IP: 192.168.0.133
          - Intended role: bypass router
          - Packages: SSR-Plus, Xray, Shadowsocks-Rust, MosDNS, SmartDNS
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.release_tag }}
          name: OpenWrt-6.12-Optimized-${{ env.KERNEL_VERSION }}_${{ env.FILE_DATE }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: env.UPLOAD_RELEASE == 'true'
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 3
