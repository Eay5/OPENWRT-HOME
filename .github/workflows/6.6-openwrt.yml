name: Build 6.6 OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: SSH connection to Actions
        required: false
        default: "false"
  schedule:
    - cron: "0 19 * * *"
  watch:
    types:
      - started

jobs:
  build:
    uses: ./.github/workflows/reusable-openwrt-build.yml
    secrets: inherit
    with:
      enable_ssh: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.ssh == 'true') || github.event.action == 'ssh' }}
      config_file: 6.6.config
      diy_p1_sh: 6.6-part1.sh
      diy_p2_sh: 6.6-part2.sh
      kernel_series: "6.6"
      firmware_artifact_prefix: OpenWrt-6.6
      bin_artifact_prefix: OpenWrt_bin
      release_title_template: OpenWrt {{kernel}}-X86-64{{date}}
      config_sync_mode: proxy_stack_required
