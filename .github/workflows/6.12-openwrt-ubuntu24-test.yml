name: Build 6.12 OpenWrt Ubuntu 24.04 Test

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: SSH connection to Actions
        required: false
        default: "false"
  schedule:
    - cron: "0 19 * * *"
  watch:
    types:
      - started

jobs:
  build:
    uses: ./.github/workflows/reusable-openwrt-build.yml
    secrets: inherit
    with:
      runner: ubuntu-24.04
      apt_ncurses_package: libncurses-dev
      enable_ssh: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.ssh == 'true') || github.event.action == 'ssh' }}
      config_file: 6.12.config
      diy_p1_sh: 6.12-part1.sh
      diy_p2_sh: 6.12-part2.sh
      kernel_series: "6.12"
      firmware_artifact_prefix: OpenWrt-6.12-Ubuntu24-Test
      bin_artifact_prefix: OpenWrt-6.12-Ubuntu24-Test-bin
      release_title_template: OpenWrt Linux-{{kernel}} Ubuntu24-Test{{device}}{{date}}
      release_notes_title: Ubuntu 24.04 test build
      release_tag_prefix: ubuntu24-test-
      toolchain_log_name: toolchain-install-logs-ubuntu24-test
      build_log_name: build-log-ubuntu24-test
      extra_feed_packages: pcre2 luci-app-ssr-plus lua-neturl tcping dns2socks microsocks shadowsocks-libev shadowsocksr-libev simple-obfs v2ray-plugin xray-core
      config_sync_mode: ssr_plus_612
