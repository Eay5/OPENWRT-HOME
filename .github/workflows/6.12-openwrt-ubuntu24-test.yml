name: Build 6.12-OpenWrt Ubuntu 24.04 Test

on:
  schedule:
    # GitHub Actions cron uses UTC. 20:00 UTC = 04:00 Asia/Shanghai next day.
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      ssh:
        description: SSH connection to Actions
        required: false
        default: "false"
      release:
        description: Publish firmware as a GitHub Release
        required: false
        type: boolean
        default: true

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 6.12.config
  DIY_P1_SH: 6.12-part1.sh
  DIY_P2_SH: 6.12-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space
        uses: coder-xiaomo/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker images -q | xargs -r docker rmi || true
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android

          purge_patterns=(
            azure-cli
            docker
            ghc
            zulu
            llvm
            firefox
            google
            dotnet
            powershell
            openjdk
            mysql
            php
            mongodb
            snap
          )

          packages_to_purge=()
          for pattern in "${purge_patterns[@]}"; do
            while IFS= read -r pkg; do
              [ -n "$pkg" ] && packages_to_purge+=("$pkg")
            done < <(dpkg-query -W -f='${binary:Package}\n' "${pattern}*" 2>/dev/null || true)
          done

          if [ "${#packages_to_purge[@]}" -gt 0 ]; then
            mapfile -t packages_to_purge < <(printf '%s\n' "${packages_to_purge[@]}" | sort -u)
            printf 'Purging packages:\n%s\n' "${packages_to_purge[@]}"
            sudo -E apt-get purge -y "${packages_to_purge[@]}"
          else
            echo "No preinstalled packages matched purge patterns."
          fi

          sudo -E apt-mark hold grub-efi-amd64-signed || true
          sudo -E apt-get update
          sudo -E apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            llvm python3-pyelftools libpython3-dev \
            libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev ccache \
            autoconf automake libtool cmake ninja-build
          sudo -E systemctl daemon-reload
          sudo -E apt-get autoremove -y --purge
          sudo -E apt-get clean
          sudo -E timedatectl set-timezone "${TZ}"
          sudo mkdir -p /workdir
          sudo chown "$USER:$(id -gn)" /workdir

      - name: Clone OpenWrt source
        run: |
          df -hT "$PWD"
          git clone --depth 1 --single-branch "$REPO_URL" -b "$REPO_BRANCH" openwrt

      - name: Prepare build directories
        run: |
          cd openwrt
          rm -rf staging_dir build_dir bin tmp
          mkdir -p dl bin staging_dir build_dir .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=3G" >> "$GITHUB_ENV"
          echo "CCACHE_COMPILERCHECK=content" >> "$GITHUB_ENV"

      - name: Restore download cache
        uses: actions/cache@v5
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-6.12-dl-${{ hashFiles('feeds.conf.default', '6.12-part1.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-6.12-dl-

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-openwrt-6.12-ccache-${{ hashFiles('feeds.conf.default', '6.12.config', '6.12-part1.sh', '6.12-part2.sh') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-6.12-ccache-

      - name: Validate custom files
        run: |
          ls -l "$GITHUB_WORKSPACE/"
          [ -f "$CONFIG_FILE" ] && echo "$CONFIG_FILE found" || { echo "$CONFIG_FILE not found"; exit 1; }
          [ -f "$DIY_P1_SH" ] && echo "$DIY_P1_SH found" || { echo "$DIY_P1_SH not found"; exit 1; }
          [ -f "$DIY_P2_SH" ] && echo "$DIY_P2_SH found" || { echo "$DIY_P2_SH not found"; exit 1; }

      - name: Load custom feeds
        run: |
          [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
          chmod +x "$DIY_P1_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P1_SH"

      - name: Load custom config
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" openwrt/.config
          chmod +x "$DIY_P2_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: Install feed packages
        run: |
          cd openwrt
          ./scripts/feeds install -a
          ./scripts/feeds install -f -p packages pcre2
          ./scripts/feeds install -f -p kenzo luci-theme-argon luci-app-argon-config
          ./scripts/feeds install -f -p small luci-app-ssr-plus lua-neturl tcping dns2socks dns2tcp microsocks shadowsocks-libev shadowsocksr-libev simple-obfs v2ray-plugin xray-core

          [ -f package/feeds/small/luci-app-ssr-plus/Makefile ] || { echo 'luci-app-ssr-plus was not linked into package/feeds/small'; exit 1; }
          [ -f package/feeds/small/shadowsocksr-libev/Makefile ] || { echo 'shadowsocksr-libev was not linked into package/feeds/small'; exit 1; }
          [ -f package/feeds/small/shadowsocks-libev/Makefile ] || { echo 'shadowsocks-libev was not linked into package/feeds/small'; exit 1; }

      - name: Sync config
        run: |
          cd openwrt
          make defconfig

          ensure_config() {
            local key="$1"
            local value="$2"

            if grep -q "^${key}=" .config; then
              sed -i "s/^${key}=.*/${key}=${value}/" .config
            else
              echo "${key}=${value}" >> .config
            fi
          }

          echo "Reapplying forced package toggles..."
          ensure_config CONFIG_DEVEL n
          ensure_config CONFIG_CCACHE y
          ensure_config CONFIG_PACKAGE_ksmbd-server n
          ensure_config CONFIG_PACKAGE_ksmbd-utils n
          ensure_config CONFIG_PACKAGE_luci-app-ksmbd n
          ensure_config CONFIG_PACKAGE_kmod-fs-ksmbd n
          ensure_config CONFIG_PACKAGE_autosamba n
          ensure_config CONFIG_PACKAGE_luci-app-nlbwmon n
          ensure_config CONFIG_PACKAGE_firewall4 n
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus y
          ensure_config CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn y
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_Iptables_Transparent_Proxy y
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_Nftables_Transparent_Proxy n
          ensure_config CONFIG_PACKAGE_dnsmasq_full_ipset y
          ensure_config CONFIG_PACKAGE_dnsmasq_full_nftset n
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_V2ray n
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray y
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_MosDNS y
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Hysteria n
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Tuic_Client n
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadow_TLS n
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_NaiveProxy n
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Redsocks2 n
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Kcptun n
          ensure_config CONFIG_PACKAGE_smartdns-ui n
          ensure_config CONFIG_PACKAGE_shadowsocksr-libev-ssr-check y
          ensure_config CONFIG_PACKAGE_libpcre2 y
          ensure_config CONFIG_PACKAGE_coreutils y
          ensure_config CONFIG_PACKAGE_coreutils-base64 y
          ensure_config CONFIG_PACKAGE_dns2tcp y
          ensure_config CONFIG_PACKAGE_ip-full y
          ensure_config CONFIG_PACKAGE_jq y
          ensure_config CONFIG_PACKAGE_lua-neturl y
          ensure_config CONFIG_PACKAGE_resolveip y
          ensure_config CONFIG_PACKAGE_nping y

          make defconfig

          echo "Final key package selections:"
          grep -E '^CONFIG_PACKAGE_(luci-app-ssr-plus|luci-i18n-ssr-plus-zh-cn|shadowsocksr-libev-ssr-check|shadowsocksr-libev-ssr-local|shadowsocksr-libev-ssr-redir|shadowsocks-libev-ss-local|shadowsocks-libev-ss-redir|simple-obfs|xray-core|v2ray-plugin|dns2socks|dns2tcp|lua-neturl|mosdns|smartdns|libpcre2|firewall4|dnsmasq_full_ipset)=' .config || true

          grep -q '^CONFIG_PACKAGE_luci-app-ssr-plus=y' .config || {
            echo 'luci-app-ssr-plus was dropped during defconfig'
            echo 'Installed candidate package directories:'
            find package package/feeds -maxdepth 3 -type d \( -name 'luci-app-ssr-plus' -o -name 'shadowsocksr-libev' -o -name 'shadowsocks-libev' -o -name 'xray-core' -o -name 'v2ray-plugin' -o -name 'dns2socks' -o -name 'dns2tcp' -o -name 'lua-neturl' -o -name 'pcre2' \) | sort || true
            exit 1
          }
          grep -q '^CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn=y' .config || { echo 'luci-i18n-ssr-plus-zh-cn was not enabled'; exit 1; }
          grep -q '^CONFIG_PACKAGE_shadowsocksr-libev-ssr-check=y' .config || { echo 'shadowsocksr-libev-ssr-check was not enabled'; exit 1; }
          grep -q '^CONFIG_PACKAGE_libpcre2=y' .config || { echo 'libpcre2 was not enabled'; exit 1; }

      - name: Build tools and toolchain
        run: |
          cd openwrt
          ccache -M "${CCACHE_MAXSIZE}" || true
          ccache -s || true
          echo "Building tools..."
          make tools/install -j"$(nproc)" 2>&1 | tee tools_install.log || make tools/install -j1 V=s 2>&1 | tee tools_install.log
          echo "Building toolchain..."
          make toolchain/install -j"$(nproc)" 2>&1 | tee toolchain_install.log || make toolchain/install -j1 V=s 2>&1 | tee toolchain_install.log

      - name: Upload toolchain logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: toolchain-install-logs-ubuntu24-test
          path: |
            openwrt/tools_install.log
            openwrt/toolchain_install.log

      - name: Download packages
        id: package
        run: |
          cd openwrt
          echo "Downloading packages..."
          for i in 1 2 3 4 5; do
            echo "=== Download attempt $i/5 ==="
            make download -j8 2>&1 | tee -a download.log && break
            echo "Download failed, removing broken files before retry..."
            find dl -size -1024c -exec rm -f {} \;
            sleep 10
          done
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Check disk space
        run: |
          df -hT

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          echo "Starting build with $(nproc) threads on Ubuntu 24.04"
          ccache -s || true
          if make -j"$(nproc)" 2>&1 | tee build.log; then
            echo "Build succeeded"
          else
            echo "Parallel build failed, retrying with a single job..."
            find dl -size -1024c -exec rm -f {} \;
            make download -j4 V=s 2>&1 | tee -a download.log || true
            make -j1 V=s 2>&1 | tee -a build.log
          fi
          ccache -s || true

          echo "Checking generated firmware:"
          ls -la bin/targets/*/* || echo "No firmware generated in bin/targets"
          echo "status=success" >> "$GITHUB_ENV"
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-log-ubuntu24-test
          path: openwrt/build.log

      - name: Get kernel version
        if: env.status == 'success'
        run: |
          kernel_version="$(sed -n 's/^LINUX_VERSION-6\.12[[:space:]]*[:?]?=[[:space:]]*//p' openwrt/include/kernel-6.12 | head -n 1 | tr -d '\r')"
          if [ -z "${kernel_version}" ]; then
            kernel_version="6.12"
          elif [[ "${kernel_version}" =~ ^\.[0-9]+$ ]]; then
            kernel_version="6.12${kernel_version}"
          elif [[ "${kernel_version}" =~ ^[0-9]+$ ]]; then
            kernel_version="6.12.${kernel_version}"
          fi
          echo "KERNEL_VERSION_6_12=${kernel_version}" >> "$GITHUB_ENV"

      - name: Check disk usage
        if: (!cancelled())
        run: |
          df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@v6
        if: env.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          compression-level: 0
          if-no-files-found: error
          name: OpenWrt-6.12-Ubuntu24-Test-bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize firmware files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          if ls openwrt/bin/targets/*/* >/dev/null 2>&1; then
            cd openwrt/bin/targets/*/*
            rm -rf packages
            echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
            echo "status=success" >> "$GITHUB_ENV"
          else
            echo "No firmware found in openwrt/bin/targets/"
            echo "status=failure" >> "$GITHUB_ENV"
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        if: env.status == 'success' && !cancelled()
        with:
          compression-level: 0
          if-no-files-found: error
          name: OpenWrt-6.12-Ubuntu24-Test${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Create release metadata
        if: env.status == 'success' && !cancelled() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.release) || env.UPLOAD_RELEASE == 'true')
        run: |
          echo "release_tag=ubuntu24-test-$(date +"%Y.%m.%d-%H%M")-r${GITHUB_RUN_NUMBER}a${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          cat > release.txt <<EOF
          OpenWrt 6.12 Ubuntu 24.04 test build

          Kernel: ${KERNEL_VERSION_6_12}
          Device: ${DEVICE_NAME:-_generic}
          Build time: ${FILE_DATE}
          Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

      - name: Publish release
        if: env.status == 'success' && !cancelled() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.release) || env.UPLOAD_RELEASE == 'true')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=("${FIRMWARE}"/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No firmware files found in ${FIRMWARE}" >&2
            exit 1
          fi

          gh release create "${release_tag}" "${files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "OpenWrt Linux-${KERNEL_VERSION_6_12} Ubuntu24 Test${DEVICE_NAME}${FILE_DATE}" \
            --notes-file release.txt
