name: Build 5.10 Lucky OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: SSH connection to Actions
        required: false
        default: "false"
  schedule:
    - cron: "0 19 * * *"
  watch:
    types:
      - started

jobs:
  build:
    uses: ./.github/workflows/reusable-openwrt-build.yml
    secrets: inherit
    with:
      enable_ssh: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.ssh == 'true') || github.event.action == 'ssh' }}
      config_file: 5.10.lucky.config
      diy_p1_sh: 5.10.lucky-part1.sh
      diy_p2_sh: 5.10.lucky-part2.sh
      kernel_series: "5.10"
      firmware_artifact_prefix: OpenWrt-5.10
      bin_artifact_prefix: OpenWrt_bin
      release_title_template: OpenWrt {{kernel}}-lucky-X86-64{{date}}
