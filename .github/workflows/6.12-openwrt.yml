name: Build 6.12-OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: SSH connection to Actions
        required: false
        default: "false"
  schedule:
    - cron: "0 19 * * *"
  watch:
    types:
      - started

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 6.12.config
  DIY_P1_SH: 6.12-part1.sh
  DIY_P2_SH: 6.12-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: true
  UPLOAD_WETRANSFER: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space
        uses: coder-xiaomo/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker images -q | xargs -r docker rmi || true
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
          sudo -E apt -y full-upgrade
          sudo -E apt -y install build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            llvm python3-pyelftools libpython3-dev \
            libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev \
            autoconf automake libtool cmake ninja-build
          sudo -E systemctl daemon-reload
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo -E timedatectl set-timezone "${TZ}"
          sudo mkdir -p /workdir
          sudo chown "$USER:$(id -gn)" /workdir

      - name: Clone OpenWrt source
        run: |
          df -hT "$PWD"
          git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt

      - name: Prepare build directories
        run: |
          cd openwrt
          rm -rf staging_dir build_dir bin tmp dl .ccache
          mkdir -p dl bin staging_dir build_dir

      - name: Validate custom files
        run: |
          ls -l "$GITHUB_WORKSPACE/"
          [ -f "$CONFIG_FILE" ] && echo "$CONFIG_FILE found" || { echo "$CONFIG_FILE not found"; exit 1; }
          [ -f "$DIY_P1_SH" ] && echo "$DIY_P1_SH found" || { echo "$DIY_P1_SH not found"; exit 1; }
          [ -f "$DIY_P2_SH" ] && echo "$DIY_P2_SH found" || { echo "$DIY_P2_SH not found"; exit 1; }

      - name: Load custom feeds
        run: |
          [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
          chmod +x "$DIY_P1_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P1_SH"

      - name: Load custom config
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" openwrt/.config
          chmod +x "$DIY_P2_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: Install feed packages
        run: |
          cd openwrt
          # Keep feed installation simple and deterministic after feed cleanup.
          ./scripts/feeds install -a -f
          ./scripts/feeds install -f pcre2 luci-app-ssr-plus lua-neturl tcping dns2socks microsocks shadowsocks-libev shadowsocksr-libev simple-obfs v2ray-plugin xray-core

      - name: Sync config
        run: |
          cd openwrt
          make defconfig

          ensure_config() {
            local key="$1"
            local value="$2"

            if grep -q "^${key}=" .config; then
              sed -i "s/^${key}=.*/${key}=${value}/" .config
            else
              echo "${key}=${value}" >> .config
            fi
          }

          echo "Reapplying forced package toggles..."
          ensure_config CONFIG_DEVEL n
          ensure_config CONFIG_CCACHE n
          ensure_config CONFIG_PACKAGE_ksmbd-server n
          ensure_config CONFIG_PACKAGE_ksmbd-utils n
          ensure_config CONFIG_PACKAGE_luci-app-ksmbd n
          ensure_config CONFIG_PACKAGE_kmod-fs-ksmbd n
          ensure_config CONFIG_PACKAGE_autosamba n
          ensure_config CONFIG_PACKAGE_luci-app-nlbwmon n
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus y
          ensure_config CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn y
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_Iptables_Transparent_Proxy y
          ensure_config CONFIG_PACKAGE_luci-app-ssr-plus_Nftables_Transparent_Proxy n
          ensure_config CONFIG_PACKAGE_shadowsocksr-libev-ssr-check y
          ensure_config CONFIG_PACKAGE_libpcre2 y
          ensure_config CONFIG_PACKAGE_coreutils y
          ensure_config CONFIG_PACKAGE_coreutils-base64 y
          ensure_config CONFIG_PACKAGE_ip-full y
          ensure_config CONFIG_PACKAGE_jq y
          ensure_config CONFIG_PACKAGE_lua-neturl y
          ensure_config CONFIG_PACKAGE_resolveip y
          ensure_config CONFIG_PACKAGE_nping y

          make defconfig

          grep -q '^CONFIG_PACKAGE_luci-app-ssr-plus=y' .config || { echo 'luci-app-ssr-plus was dropped during defconfig'; exit 1; }
          grep -q '^CONFIG_PACKAGE_shadowsocksr-libev-ssr-check=y' .config || { echo 'shadowsocksr-libev-ssr-check was not enabled'; exit 1; }
          grep -q '^CONFIG_PACKAGE_libpcre2=y' .config || { echo 'libpcre2 was not enabled'; exit 1; }

      - name: Build tools and toolchain
        run: |
          cd openwrt
          echo "Building tools..."
          make tools/install -j"$(nproc)" V=s 2>&1 | tee tools_install.log || make tools/install -j1 V=s 2>&1 | tee tools_install.log
          echo "Building toolchain..."
          make toolchain/install -j"$(nproc)" V=s 2>&1 | tee toolchain_install.log || make toolchain/install -j1 V=s 2>&1 | tee toolchain_install.log

      - name: Upload toolchain logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: toolchain-install-logs
          path: |
            openwrt/tools_install.log
            openwrt/toolchain_install.log

      - name: Download packages
        id: package
        run: |
          cd openwrt
          echo "Downloading packages..."
          for i in 1 2 3 4 5; do
            echo "=== Download attempt $i/5 ==="
            make download -j8 V=s 2>&1 | tee -a download.log && break
            echo "Download failed, removing broken files before retry..."
            find dl -size -1024c -exec rm -f {} \;
            sleep 10
          done
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Check disk space
        run: |
          df -hT

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          echo "Starting build with $(nproc) threads"
          if make -j"$(nproc)" V=s 2>&1 | tee build.log; then
            echo "Build succeeded"
          else
            echo "Parallel build failed, retrying with a single job..."
            find dl -size -1024c -exec rm -f {} \;
            make download -j4 V=s 2>&1 | tee -a download.log || true
            make -j1 V=s 2>&1 | tee -a build.log
          fi

          echo "Checking generated firmware:"
          ls -la bin/targets/*/* || echo "No firmware generated in bin/targets"
          echo "status=success" >> "$GITHUB_ENV"
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-log
          path: openwrt/build.log

      - name: Get kernel version
        if: env.status == 'success'
        run: |
          KERNEL_VERSION=$(grep 'LINUX_VERSION-6.12' openwrt/include/kernel-6.12 | cut -d' ' -f3)
          echo "KERNEL_VERSION_6_12=${KERNEL_VERSION}" >> "$GITHUB_ENV"

      - name: Check disk usage
        if: (!cancelled())
        run: |
          df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@v6
        if: env.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize firmware files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          if ls openwrt/bin/targets/*/* >/dev/null 2>&1; then
            cd openwrt/bin/targets/*/*
            rm -rf packages
            echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
            echo "status=success" >> "$GITHUB_ENV"
          else
            echo "No firmware found in openwrt/bin/targets/"
            echo "status=failure" >> "$GITHUB_ENV"
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        if: env.status == 'success' && !cancelled()
        with:
          name: OpenWrt-6.12${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Create release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_ENV"
          touch release.txt
          [ "$UPLOAD_COWTRANSFER" = true ] && echo "Cowtransfer enabled" >> release.txt
          echo "status=success" >> "$GITHUB_ENV"

      - name: Publish release
        if: env.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          shopt -s nullglob
          files=("${FIRMWARE}"/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No firmware files found in ${FIRMWARE}" >&2
            exit 1
          fi

          gh release create "${release_tag}" "${files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "OpenWrt 6.12${KERNEL_VERSION_6_12}-X86-64_${FILE_DATE}" \
            --notes-file release.txt

      - name: Delete old workflow runs
        if: always() && !cancelled()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cutoff_epoch="$(date -u -d '1 day ago' +%s)"
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/workflows?per_page=100" --jq '.workflows[].id' |
          while read -r workflow_id; do
            [ -n "${workflow_id}" ] || continue

            kept=0
            gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_id}/runs?status=completed&per_page=100" \
              --jq '.workflow_runs[] | "\(.id)\t\(.created_at)"' |
            while IFS=$'\t' read -r run_id created_at; do
              [ -n "${run_id}" ] || continue
              [ "${run_id}" != "${GITHUB_RUN_ID}" ] || continue

              if [ "${kept}" -lt 3 ]; then
                kept=$((kept + 1))
                continue
              fi

              created_epoch="$(date -u -d "${created_at}" +%s)"
              if [ "${created_epoch}" -lt "${cutoff_epoch}" ]; then
                gh run delete "${run_id}" --repo "${GITHUB_REPOSITORY}" || true
              fi
            done
          done

      - name: Delete old releases
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "${GITHUB_REPOSITORY}" --exclude-drafts --json tagName --limit 100 --jq '.[30:][].tagName' |
          while read -r tag_name; do
            [ -n "${tag_name}" ] || continue
            gh release delete "${tag_name}" --repo "${GITHUB_REPOSITORY}" --cleanup-tag --yes || true
          done
