name: Build 6.12-OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "SSH connection to Actions"
        required: false
        default: "false"
  schedule:
    - cron: "0 19 * * *"
  watch:
    types: [started]

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 6.12.config
  DIY_P1_SH: 6.12-part1.sh
  DIY_P2_SH: 6.12-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: true
  UPLOAD_WETRANSFER: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: coder-xiaomo/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          docker images -q | xargs -r docker rmi || true
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* snap*
          sudo -E apt -y full-upgrade
          sudo -E apt -y install build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            llvm python3-pyelftools libpython3-dev ccache \
            libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev \
            autoconf automake libtool cmake ninja-build
          sudo -E systemctl daemon-reload
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo -E timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER:$(id -gn)" /workdir

      - name: Clone OpenWrt source
        run: |
          set -euo pipefail
          df -hT "$PWD"
          git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt

      - name: Reset build directories
        run: |
          set -euo pipefail
          cd openwrt
          rm -rf staging_dir build_dir bin dl
          mkdir -p dl bin staging_dir build_dir

      - name: Verify local files
        run: |
          set -euo pipefail
          ls -la "$GITHUB_WORKSPACE"
          [ -f "$CONFIG_FILE" ] && echo "Found $CONFIG_FILE" || { echo "Missing $CONFIG_FILE"; exit 1; }
          [ -f "$DIY_P1_SH" ] && echo "Found $DIY_P1_SH" || { echo "Missing $DIY_P1_SH"; exit 1; }
          [ -f "$DIY_P2_SH" ] && echo "Found $DIY_P2_SH" || { echo "Missing $DIY_P2_SH"; exit 1; }

      - name: Apply feed customizations
        run: |
          set -euo pipefail
          [ -e "$FEEDS_CONF" ] && cp "$FEEDS_CONF" openwrt/feeds.conf.default
          chmod +x "$DIY_P1_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P1_SH"

      - name: Install feeds
        run: |
          set -euo pipefail
          cd openwrt
          ./scripts/feeds install -a

      - name: Apply build configuration
        run: |
          set -euo pipefail
          if [ -d files ]; then
            mkdir -p openwrt/files
            cp -r files/. openwrt/files/
          fi
          cp "$CONFIG_FILE" openwrt/.config
          chmod +x "$DIY_P2_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: SSH debug
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Finalize .config
        run: |
          set -euo pipefail
          cd openwrt
          make defconfig
          { yes "" || test $? -eq 141; } | make oldconfig

          ensure_config() {
            local key="$1"
            local value="$2"

            if grep -q "^${key}=" .config; then
              sed -i "s/^${key}=.*/${key}=${value}/" .config
            else
              echo "${key}=${value}" >> .config
            fi
          }

          echo "Reapplying package toggles after oldconfig..."
          ensure_config CONFIG_PACKAGE_ksmbd-server n
          ensure_config CONFIG_PACKAGE_ksmbd-utils n
          ensure_config CONFIG_PACKAGE_luci-app-ksmbd n
          ensure_config CONFIG_PACKAGE_kmod-fs-ksmbd n
          ensure_config CONFIG_PACKAGE_autosamba n

      - name: Build tools and toolchain
        run: |
          set -euo pipefail
          cd openwrt
          echo "Building tools..."
          make tools/install -j"$(nproc)" V=s 2>&1 | tee tools_install.log || make tools/install -j1 V=s 2>&1 | tee tools_install.log
          echo "Building toolchain..."
          make toolchain/install -j"$(nproc)" V=s 2>&1 | tee toolchain_install.log || make toolchain/install -j1 V=s 2>&1 | tee toolchain_install.log

      - name: Upload toolchain logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-install-logs
          path: |
            openwrt/tools_install.log
            openwrt/toolchain_install.log

      - name: Download packages
        run: |
          set -euo pipefail
          cd openwrt
          echo "Downloading packages..."
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5"
            make download -j8 V=s 2>&1 | tee -a download.log && break
            echo "Download failed, removing incomplete files before retry..."
            find dl -size -1024c -exec rm -f {} \;
            sleep 10
          done
          find dl -size -1024c -exec ls -l {} \; || true
          find dl -size -1024c -exec rm -f {} \; || true

      - name: Show disk usage
        run: df -hT

      - name: Build firmware
        id: compile
        run: |
          set -euo pipefail
          cd openwrt
          echo "Starting build with $(nproc) jobs"

          if make -j"$(nproc)" V=s 2>&1 | tee build.log; then
            echo "Parallel build completed successfully."
          else
            echo "Parallel build failed, retrying with -j1..."
            find dl -size -1024c -exec rm -f {} \;
            make download -j4 V=s 2>&1 | tee -a download.log || true
            make -j1 V=s 2>&1 | tee -a build.log
          fi

          echo "status=success" >> "$GITHUB_OUTPUT"
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME || true
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            openwrt/.config
            openwrt/build.log
            openwrt/download.log
            openwrt/tools_install.log
            openwrt/toolchain_install.log

      - name: Detect kernel version
        if: steps.compile.outputs.status == 'success'
        run: |
          set -euo pipefail
          KERNEL_VERSION=$(grep 'LINUX_VERSION-6.12' openwrt/include/kernel-6.12 2>/dev/null | cut -d' ' -f3 || echo "6.12")
          echo "KERNEL_VERSION_6_12=${KERNEL_VERSION}" >> "$GITHUB_ENV"

      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize firmware
        id: organize
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
        run: |
          set -euo pipefail
          if ls openwrt/bin/targets/*/* >/dev/null 2>&1; then
            cd openwrt/bin/targets/*/*
            rm -rf packages
            echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "No firmware found in openwrt/bin/targets/"
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success'
        with:
          name: OpenWrt-6.12${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          if-no-files-found: error

      - name: Prepare release notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
        run: |
          set -euo pipefail
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_ENV"
          {
            echo "OpenWrt 6.12 automated build"
            echo
            echo "- Kernel: ${{ env.KERNEL_VERSION_6_12 }}"
            echo "- Device suffix: ${{ env.DEVICE_NAME }}"
            echo "- Build time: ${{ env.FILE_DATE }}"
          } > release.txt
          [ "$UPLOAD_COWTRANSFER" = "true" ] && echo "- Cowtransfer upload enabled in workflow settings" >> release.txt
          [ "$UPLOAD_WETRANSFER" = "true" ] && echo "- WeTransfer upload enabled in workflow settings" >> release.txt

      - name: Publish release
        uses: softprops/action-gh-release@v1
        if: env.UPLOAD_RELEASE == 'true' && steps.organize.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          name: OpenWrt 6.12${{ env.KERNEL_VERSION_6_12 }}-X86-64_${{ env.FILE_DATE }}
          tag_name: ${{ env.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete old workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@master
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          keep_latest: 30
          delete_tags: true
