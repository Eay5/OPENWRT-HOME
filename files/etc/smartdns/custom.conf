# SS/Xray focused upstream preset
#
# Keep this file small and predictable:
# - domestic secure resolvers for CN sites
# - overseas secure resolvers for global sites
# SmartDNS will race upstreams and return the better result based on runtime
# speed checks configured through UCI defaults.

server-https https://dns.alidns.com/dns-query
server-https https://doh.pub/dns-query
server-https https://cloudflare-dns.com/dns-query
server-https https://dns.google/dns-query
