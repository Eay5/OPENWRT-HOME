# SmartDNS upstream preset for the standard builds.
#
# Goals:
# - keep predictable domestic HTTPS resolvers first
# - add reliable global HTTPS resolvers as fallback
# - leave speed-based selection to the UCI/runtime layer

server-https https://dns.alidns.com/dns-query
server-https https://doh.pub/dns-query
server-https https://cloudflare-dns.com/dns-query
server-https https://dns.google/dns-query
